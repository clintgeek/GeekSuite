<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F9F8F6" />
    <meta name="description" content="DashGeek — the GeekSuite control surface." />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Geist (display + body) matches basegeek / notegeek — one sans
         across the whole suite. JetBrains Mono for every metric,
         timestamp, and metadata pill. This pair is the entire
         typographic identity; don't add a third face. -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Baseline colors snap before MUI mounts. Must match
         createAppTheme.js surfaces.default + text.primary exactly
         or you get a flash when React boots. -->
    <style>
      :root                    { background-color: #F9F8F6; color: #1F1C16; }
      :root[data-theme="dark"] { background-color: #16140F; color: #EDE6D6; }
      body                     { margin: 0; background-color: inherit; color: inherit; }
    </style>

    <title>DashGeek</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
