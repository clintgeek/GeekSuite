<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <!-- Background -->
  <rect width="600" height="400" fill="#fefefe"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">Example Song Sheet</text>
  <text x="300" y="55" text-anchor="middle" font-size="14" fill="#666">Simple Folk Song</text>

  <!-- Chord Diagrams Section -->
  <text x="50" y="90" font-size="14" font-weight="bold" fill="#333">Chords Used:</text>

  <!-- G Chord Diagram -->
  <g transform="translate(50, 100)">
    <text x="30" y="10" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">G</text>
    <!-- Fretboard -->
    <rect x="10" y="20" width="40" height="50" fill="none" stroke="#333" stroke-width="2"/>
    <!-- Strings -->
    <line x1="20" y1="20" x2="20" y2="70" stroke="#666" stroke-width="1"/>
    <line x1="30" y1="20" x2="30" y2="70" stroke="#666" stroke-width="1"/>
    <line x1="40" y1="20" x2="40" y2="70" stroke="#666" stroke-width="1"/>
    <!-- Frets -->
    <line x1="10" y1="35" x2="50" y2="35" stroke="#666" stroke-width="1"/>
    <line x1="10" y1="50" x2="50" y2="50" stroke="#666" stroke-width="1"/>
    <!-- Fingers -->
    <circle cx="10" cy="42" r="4" fill="#2563eb"/>
    <circle cx="40" cy="57" r="4" fill="#2563eb"/>
    <circle cx="50" cy="57" r="4" fill="#2563eb"/>
    <!-- Open strings -->
    <circle cx="20" cy="12" r="3" fill="none" stroke="#333" stroke-width="1.5"/>
    <circle cx="30" cy="12" r="3" fill="none" stroke="#333" stroke-width="1.5"/>
  </g>

  <!-- C Chord Diagram -->
  <g transform="translate(130, 100)">
    <text x="30" y="10" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">C</text>
    <rect x="10" y="20" width="40" height="50" fill="none" stroke="#333" stroke-width="2"/>
    <line x1="20" y1="20" x2="20" y2="70" stroke="#666" stroke-width="1"/>
    <line x1="30" y1="20" x2="30" y2="70" stroke="#666" stroke-width="1"/>
    <line x1="40" y1="20" x2="40" y2="70" stroke="#666" stroke-width="1"/>
    <line x1="10" y1="35" x2="50" y2="35" stroke="#666" stroke-width="1"/>
    <line x1="10" y1="50" x2="50" y2="50" stroke="#666" stroke-width="1"/>
    <circle cx="20" cy="27" r="4" fill="#2563eb"/>
    <circle cx="30" cy="42" r="4" fill="#2563eb"/>
    <circle cx="50" cy="57" r="4" fill="#2563eb"/>
    <circle cx="40" cy="12" r="3" fill="none" stroke="#333" stroke-width="1.5"/>
    <text x="10" y="15" text-anchor="middle" font-size="10" font-weight="bold" fill="#c00">X</text>
  </g>

  <!-- D Chord Diagram -->
  <g transform="translate(210, 100)">
    <text x="30" y="10" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">D</text>
    <rect x="10" y="20" width="40" height="50" fill="none" stroke="#333" stroke-width="2"/>
    <line x1="20" y1="20" x2="20" y2="70" stroke="#666" stroke-width="1"/>
    <line x1="30" y1="20" x2="30" y2="70" stroke="#666" stroke-width="1"/>
    <line x1="40" y1="20" x2="40" y2="70" stroke="#666" stroke-width="1"/>
    <line x1="10" y1="35" x2="50" y2="35" stroke="#666" stroke-width="1"/>
    <line x1="10" y1="50" x2="50" y2="50" stroke="#666" stroke-width="1"/>
    <circle cx="30" cy="42" r="4" fill="#2563eb"/>
    <circle cx="40" cy="57" r="4" fill="#2563eb"/>
    <circle cx="50" cy="42" r="4" fill="#2563eb"/>
    <circle cx="20" cy="12" r="3" fill="none" stroke="#333" stroke-width="1.5"/>
    <text x="10" y="15" text-anchor="middle" font-size="10" font-weight="bold" fill="#c00">X</text>
  </g>

  <!-- Em Chord Diagram -->
  <g transform="translate(290, 100)">
    <text x="30" y="10" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Em</text>
    <rect x="10" y="20" width="40" height="50" fill="none" stroke="#333" stroke-width="2"/>
    <line x1="20" y1="20" x2="20" y2="70" stroke="#666" stroke-width="1"/>
    <line x1="30" y1="20" x2="30" y2="70" stroke="#666" stroke-width="1"/>
    <line x1="40" y1="20" x2="40" y2="70" stroke="#666" stroke-width="1"/>
    <line x1="10" y1="35" x2="50" y2="35" stroke="#666" stroke-width="1"/>
    <line x1="10" y1="50" x2="50" y2="50" stroke="#666" stroke-width="1"/>
    <circle cx="40" cy="42" r="4" fill="#2563eb"/>
    <circle cx="50" cy="42" r="4" fill="#2563eb"/>
    <circle cx="10" cy="12" r="3" fill="none" stroke="#333" stroke-width="1.5"/>
    <circle cx="20" cy="12" r="3" fill="none" stroke="#333" stroke-width="1.5"/>
    <circle cx="30" cy="12" r="3" fill="none" stroke="#333" stroke-width="1.5"/>
  </g>

  <!-- Song Structure Section -->
  <text x="50" y="210" font-size="14" font-weight="bold" fill="#333">Song Structure:</text>

  <!-- Verse -->
  <text x="50" y="240" font-size="13" font-weight="bold" fill="#555">Verse:</text>
  <g transform="translate(50, 255)">
    <rect x="0" y="0" width="45" height="30" fill="#e8f4f8" stroke="#2563eb" stroke-width="1" rx="3"/>
    <text x="22" y="20" text-anchor="middle" font-size="16" font-weight="bold" fill="#2563eb">G</text>
  </g>
  <g transform="translate(110, 255)">
    <rect x="0" y="0" width="45" height="30" fill="#e8f4f8" stroke="#2563eb" stroke-width="1" rx="3"/>
    <text x="22" y="20" text-anchor="middle" font-size="16" font-weight="bold" fill="#2563eb">C</text>
  </g>
  <g transform="translate(170, 255)">
    <rect x="0" y="0" width="45" height="30" fill="#e8f4f8" stroke="#2563eb" stroke-width="1" rx="3"/>
    <text x="22" y="20" text-anchor="middle" font-size="16" font-weight="bold" fill="#2563eb">G</text>
  </g>
  <g transform="translate(230, 255)">
    <rect x="0" y="0" width="45" height="30" fill="#e8f4f8" stroke="#2563eb" stroke-width="1" rx="3"/>
    <text x="22" y="20" text-anchor="middle" font-size="16" font-weight="bold" fill="#2563eb">D</text>
  </g>

  <!-- Chorus -->
  <text x="50" y="310" font-size="13" font-weight="bold" fill="#555">Chorus:</text>
  <g transform="translate(50, 325)">
    <rect x="0" y="0" width="45" height="30" fill="#fef3e8" stroke="#f59e0b" stroke-width="1" rx="3"/>
    <text x="22" y="20" text-anchor="middle" font-size="16" font-weight="bold" fill="#f59e0b">C</text>
  </g>
  <g transform="translate(110, 325)">
    <rect x="0" y="0" width="45" height="30" fill="#fef3e8" stroke="#f59e0b" stroke-width="1" rx="3"/>
    <text x="22" y="20" text-anchor="middle" font-size="16" font-weight="bold" fill="#f59e0b">D</text>
  </g>
  <g transform="translate(170, 325)">
    <rect x="0" y="0" width="45" height="30" fill="#fef3e8" stroke="#f59e0b" stroke-width="1" rx="3"/>
    <text x="22" y="20" text-anchor="middle" font-size="16" font-weight="bold" fill="#f59e0b">Em</text>
  </g>
  <g transform="translate(230, 325)">
    <rect x="0" y="0" width="45" height="30" fill="#fef3e8" stroke="#f59e0b" stroke-width="1" rx="3"/>
    <text x="22" y="20" text-anchor="middle" font-size="16" font-weight="bold" fill="#f59e0b">C</text>
  </g>

  <!-- Legend -->
  <text x="400" y="210" font-size="14" font-weight="bold" fill="#333">How to Read:</text>
  <text x="400" y="235" font-size="11" fill="#555">• Chord boxes show finger positions</text>
  <text x="400" y="255" font-size="11" fill="#555">• O = play open string</text>
  <text x="400" y="275" font-size="11" fill="#555">• X = don't play that string</text>
  <text x="400" y="295" font-size="11" fill="#555">• Blue dots = where to press</text>
  <text x="400" y="315" font-size="11" fill="#555">• Play chords in order shown</text>
  <text x="400" y="335" font-size="11" fill="#555">• Each chord = 4 beats</text>
</svg>
