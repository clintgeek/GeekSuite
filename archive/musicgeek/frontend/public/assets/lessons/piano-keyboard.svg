<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200">
  <!-- Piano Keyboard -->
  <!-- White keys -->
  <rect x="20" y="50" width="40" height="120" fill="white" stroke="#333" stroke-width="2"/>
  <rect x="60" y="50" width="40" height="120" fill="white" stroke="#333" stroke-width="2"/>
  <rect x="100" y="50" width="40" height="120" fill="white" stroke="#333" stroke-width="2"/>
  <rect x="140" y="50" width="40" height="120" fill="white" stroke="#333" stroke-width="2"/>
  <rect x="180" y="50" width="40" height="120" fill="white" stroke="#333" stroke-width="2"/>
  <rect x="220" y="50" width="40" height="120" fill="white" stroke="#333" stroke-width="2"/>
  <rect x="260" y="50" width="40" height="120" fill="white" stroke="#333" stroke-width="2"/>
  <rect x="300" y="50" width="40" height="120" fill="white" stroke="#333" stroke-width="2"/>
  <rect x="340" y="50" width="40" height="120" fill="white" stroke="#333" stroke-width="2"/>
  <rect x="380" y="50" width="40" height="120" fill="white" stroke="#333" stroke-width="2"/>
  <rect x="420" y="50" width="40" height="120" fill="white" stroke="#333" stroke-width="2"/>
  <rect x="460" y="50" width="40" height="120" fill="white" stroke="#333" stroke-width="2"/>

  <!-- Black keys -->
  <rect x="50" y="50" width="25" height="75" fill="#333" stroke="#000" stroke-width="1"/>
  <rect x="90" y="50" width="25" height="75" fill="#333" stroke="#000" stroke-width="1"/>
  <rect x="170" y="50" width="25" height="75" fill="#333" stroke="#000" stroke-width="1"/>
  <rect x="210" y="50" width="25" height="75" fill="#333" stroke="#000" stroke-width="1"/>
  <rect x="250" y="50" width="25" height="75" fill="#333" stroke="#000" stroke-width="1"/>
  <rect x="330" y="50" width="25" height="75" fill="#333" stroke="#000" stroke-width="1"/>
  <rect x="370" y="50" width="25" height="75" fill="#333" stroke="#000" stroke-width="1"/>
  <rect x="450" y="50" width="25" height="75" fill="#333" stroke="#000" stroke-width="1"/>

  <!-- Note labels -->
  <text x="40" y="185" font-family="Arial" font-size="12" text-anchor="middle">C</text>
  <text x="80" y="185" font-family="Arial" font-size="12" text-anchor="middle">D</text>
  <text x="120" y="185" font-family="Arial" font-size="12" text-anchor="middle">E</text>
  <text x="160" y="185" font-family="Arial" font-size="12" text-anchor="middle">F</text>
  <text x="200" y="185" font-family="Arial" font-size="12" text-anchor="middle">G</text>
  <text x="240" y="185" font-family="Arial" font-size="12" text-anchor="middle">A</text>
  <text x="280" y="185" font-family="Arial" font-size="12" text-anchor="middle">B</text>
  <text x="320" y="185" font-family="Arial" font-size="12" text-anchor="middle">C</text>

  <!-- Title -->
  <text x="250" y="30" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">Piano Keyboard Layout</text>
</svg>
