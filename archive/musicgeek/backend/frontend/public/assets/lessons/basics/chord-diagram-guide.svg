<svg xmlns="http://www.w3.org/2000/svg" width="300" height="320" viewBox="0 0 300 320">
  <!-- Title -->
  <text x="150" y="25" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">How to Read a Chord Diagram</text>
  
  <!-- Fretboard with labels -->
  <g transform="translate(50, 80)">
    <line x1="0" y1="0" x2="0" y2="200" stroke="#333" stroke-width="1.5"/>
    <text x="0" y="225" text-anchor="middle" font-size="12" fill="#666">E</text>
    <text x="0" y="-45" text-anchor="middle" font-size="11" fill="#999">6</text>
    <line x1="40" y1="0" x2="40" y2="200" stroke="#333" stroke-width="1.5"/>
    <text x="40" y="225" text-anchor="middle" font-size="12" fill="#666">A</text>
    <text x="40" y="-45" text-anchor="middle" font-size="11" fill="#999">5</text>
    <line x1="80" y1="0" x2="80" y2="200" stroke="#333" stroke-width="1.5"/>
    <text x="80" y="225" text-anchor="middle" font-size="12" fill="#666">D</text>
    <text x="80" y="-45" text-anchor="middle" font-size="11" fill="#999">4</text>
    <line x1="120" y1="0" x2="120" y2="200" stroke="#333" stroke-width="1.5"/>
    <text x="120" y="225" text-anchor="middle" font-size="12" fill="#666">G</text>
    <text x="120" y="-45" text-anchor="middle" font-size="11" fill="#999">3</text>
    <line x1="160" y1="0" x2="160" y2="200" stroke="#333" stroke-width="1.5"/>
    <text x="160" y="225" text-anchor="middle" font-size="12" fill="#666">B</text>
    <text x="160" y="-45" text-anchor="middle" font-size="11" fill="#999">2</text>
    <line x1="200" y1="0" x2="200" y2="200" stroke="#333" stroke-width="1.5"/>
    <text x="200" y="225" text-anchor="middle" font-size="12" fill="#666">E</text>
    <text x="200" y="-45" text-anchor="middle" font-size="11" fill="#999">1</text>
    <line x1="0" y1="0" x2="200" y2="0" stroke="#333" stroke-width="3"/>
    <line x1="0" y1="50" x2="200" y2="50" stroke="#333" stroke-width="1.5"/>
    <text x="-20" y="30" text-anchor="middle" font-size="12" fill="#666">1</text>
    <line x1="0" y1="100" x2="200" y2="100" stroke="#333" stroke-width="1.5"/>
    <text x="-20" y="80" text-anchor="middle" font-size="12" fill="#666">2</text>
    <line x1="0" y1="150" x2="200" y2="150" stroke="#333" stroke-width="1.5"/>
    <text x="-20" y="130" text-anchor="middle" font-size="12" fill="#666">3</text>
    <line x1="0" y1="200" x2="200" y2="200" stroke="#333" stroke-width="1.5"/>
    <text x="-20" y="180" text-anchor="middle" font-size="12" fill="#666">4</text>
    <text x="0" y="-15" text-anchor="middle" font-size="18" font-weight="bold" fill="#c00">X</text>
    <text x="0" y="-60" text-anchor="middle" font-size="9" fill="#c00">Don't Play</text>
    <circle cx="40" cy="-15" r="8" fill="none" stroke="#333" stroke-width="2"/>
    <text x="40" y="-60" text-anchor="middle" font-size="9" fill="#333">Play Open</text>
    <circle cx="120" cy="75" r="12" fill="#2563eb"/>
    <text x="120" y="79" text-anchor="middle" font-size="12" font-weight="bold" fill="white">2</text>
    <line x1="135" y1="75" x2="180" y2="45" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="185" y="50" font-size="10" fill="#2563eb">Finger position</text>
    <text x="185" y="62" font-size="10" fill="#2563eb">(number = finger)</text>
  </g>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  
  <text x="20" y="290" font-size="11" fill="#666">Strings numbered 6 (thickest) to 1 (thinnest)</text>
  <text x="20" y="305" font-size="11" fill="#666">Fret numbers shown on left side</text>
</svg>