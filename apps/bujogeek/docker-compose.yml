services:
  bujogeek:
    image: geeksuite/bujogeek:latest
    container_name: bujogeek
    restart: unless-stopped

    extra_hosts:
      - "host.docker.internal:host-gateway"

    # All runtime env (DB_URI, JWT_SECRET, JWT_REFRESH_SECRET, SECRET_KEY,
    # BASEGEEK_URL, PORT, etc.) is loaded from .env.production by env_file.
    # Don't list those vars here as ${VAR} substitutions — that pulls from
    # docker compose's .env file (different lookup path) and breaks when
    # only .env.production exists.
    env_file:
      - .env.production

    # Compose-fixed values that don't vary per environment.
    environment:
      APP_NAME: bujogeek
      GATEWAY_URL: http://host.docker.internal:4100

    ports:
      - "5005:5005"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5005/"]
      interval: 30s
      timeout: 10s
      retries: 3
