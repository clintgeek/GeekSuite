
services:
  bookgeek:
    image: geeksuite/bookgeek:latest
    container_name: bookgeek
    restart: unless-stopped

    extra_hosts:
      - "host.docker.internal:host-gateway"

    env_file:
      - .env.production

    environment:
      TZ: America/Chicago
      NODE_ENV: production
      API_PORT: 1800
      LIBRARY_PATH: /data/library
      COVERS_PATH: /data/covers
      TEMP_PATH: /data/temp
      ADDME_PATH: /data/addMe

    ports:
      - "1800:1800"

    volumes:
      - /mnt/extra_space/books:/data/library
      - /mnt/extra_space/books/temp:/data/temp
      - /mnt/extra_space/books/addMe:/data/addMe

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:1800/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
