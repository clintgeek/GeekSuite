
services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      TZ: America/Chicago
      API_PORT: ${API_PORT:-1800}
      NODE_ENV: ${NODE_ENV:-development}
      LIBRARY_PATH: ${LIBRARY_PATH:-/data/library}
      COVERS_PATH: ${COVERS_PATH:-/data/covers}
      TEMP_PATH: ${TEMP_PATH:-/data/temp}
    ports:
      - "${API_PORT:-1800}:1800"
    volumes:
      # Persistent data storage
      - ${HOST_DATA_PATH:-./data}:/data/library
      - ${HOST_DATA_PATH:-./data}/temp:/data/temp
      - ${HOST_DATA_PATH:-./data}/addMe:/data/addMe

    working_dir: /app
    command: ["bun", "run", "start"]
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        GEEKSUITE_REGISTRY: ${GEEKSUITE_REGISTRY:-http://172.17.0.1:4873}
    env_file:
      - .env
    environment:
      TZ: America/Chicago
      FRONTEND_PORT: ${FRONTEND_PORT:-1801}
      NODE_ENV: ${NODE_ENV:-development}
      VITE_API_URL: http://localhost:${API_PORT:-1800}
    ports:
      - "${FRONTEND_PORT:-1801}:1801"
    volumes: []
    working_dir: /app
    command: ["bun", "run", "serve"]
    depends_on:
      - api
    restart: unless-stopped
