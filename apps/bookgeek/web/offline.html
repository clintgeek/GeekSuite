<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bookgeek — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #1c1917; color: #e7e5e4;
      text-align: center; padding: 2rem;
    }
    .card { max-width: 400px; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #b45309; }
    p { font-size: 1rem; line-height: 1.6; color: #a8a29e; margin-bottom: 1.5rem; }
    button {
      background: #b45309; color: #fff; border: none; padding: 0.75rem 2rem;
      border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #d97706; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📚</div>
    <h1>You're offline</h1>
    <p>bookgeek needs an internet connection to work. Check your connection and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
