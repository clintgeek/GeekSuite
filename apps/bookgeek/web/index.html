<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <title>BookGeek</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#b45309" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles.css" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "system-ui", "-apple-system", "BlinkMacSystemFont", "sans-serif"],
              serif: ["Libre Baskerville", "Georgia", "Cambria", "Times New Roman", "serif"],
            },
            colors: {
              bg: {
                DEFAULT: "var(--color-bg-page)",
              },
              surface: {
                DEFAULT: "var(--color-bg-surface)",
                alt: "var(--color-bg-surface-alt)",
              },
              card: {
                DEFAULT: "var(--color-bg-card)",
              },
            },
          },
        },
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/dist/main.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          var refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', function() {
            if (refreshing) return;
            refreshing = true;
            window.location.reload();
          });

          navigator.serviceWorker
            .register('/sw.js')
            .then(function(registration) {
              registration.update().catch(function() {});
            })
            .catch(function() {});
        });
      }
    </script>
  </body>
</html>
