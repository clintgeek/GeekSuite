services:
  mongodb:
    image: mongo:latest
    container_name: datageek_mongodb
    ports:
      - "27018:27017"
    environment:
      - TZ=America/Chicago
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - ./data/mongodb:/data/db
      - ./mongodb-init.js:/docker-entrypoint-initdb.d/mongodb-init.js
    networks:
      - datageek_network
    restart: unless-stopped

  influxdb:
    image: influxdb:1.8
    container_name: datageek_influxdb
    ports:
      - "8086:8086"
    environment:
      # Note: INFLUXDB_ADMIN_USER/PASSWORD only used for initial setup
      # Once data exists, auth is configured in influxdb.conf
      - TZ=America/Chicago
      - INFLUXDB_DB=geekdata
      - INFLUXDB_HTTP_AUTH_ENABLED=true
    volumes:
      - ./data/influxdb:/var/lib/influxdb
      - ./data/influxdb-config:/etc/influxdb
    networks:
      - datageek_network
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: datageek_redis
    ports:
      - "6380:6379"
    environment:
      - TZ=America/Chicago
    volumes:
      - ./data/redis:/data
    networks:
      - datageek_network
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: datageek_postgres
    ports:
      - "55432:5432"
    environment:
      - TZ=America/Chicago
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - datageek_network
    restart: unless-stopped

  basegeek:
    image: geeksuite/basegeek:latest
    container_name: basegeek
    env_file:
      - .env.production
    environment:
      - TZ=America/Chicago
      - NODE_ENV=production
      - PORT=8987
    ports:
      - "8987:8987"
    depends_on:
      - mongodb
      - redis
      - postgres
      - influxdb
    networks:
      - datageek_network
    restart: unless-stopped

networks:
  datageek_network:
    external: true

