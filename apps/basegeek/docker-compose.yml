version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: datageek_mongodb
    ports:
      - "27018:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - ./data/mongodb:/data/db
      - ./mongodb-init.js:/docker-entrypoint-initdb.d/mongodb-init.js
    networks:
      - datageek_network
    restart: unless-stopped

  influxdb:
    image: influxdb:1.8
    container_name: datageek_influxdb
    ports:
      - "8086:8086"
    environment:
      # Note: INFLUXDB_ADMIN_USER/PASSWORD only used for initial setup
      # Once data exists, auth is configured in influxdb.conf
      - INFLUXDB_DB=geekdata
      - INFLUXDB_HTTP_AUTH_ENABLED=true
    volumes:
      - ./data/influxdb:/var/lib/influxdb
      - ./data/influxdb-config:/etc/influxdb
    networks:
      - datageek_network
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: datageek_redis
    ports:
      - "6380:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - datageek_network
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: datageek_postgres
    ports:
      - "55432:5432"
    environment:
      - POSTGRES_USER=datageek_pg_admin
      - POSTGRES_PASSWORD=REDACTED
      - POSTGRES_DB=datageek
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - datageek_network
    restart: unless-stopped

  basegeek_app:
    build: .
    container_name: basegeek_app
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=8987
      - USE_ONNXRUNTIME_WASM=1
      - TRANSFORMERS_CACHE=/tmp/transformers_cache
      - ONNX_RUNTIME_WEB_ONLY=1
    ports:
      - "8987:8987"
    depends_on:
      - mongodb
      - redis
      - postgres
      - influxdb
    networks:
      - datageek_network
    restart: unless-stopped

  basegeek_ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: basegeek_ui
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=8988
    ports:
      - "8988:8988"
    networks:
      - datageek_network
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:

networks:
  datageek_network:
    external: true
