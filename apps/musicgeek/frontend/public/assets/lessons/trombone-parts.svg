<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Trombone Diagram -->
  <defs>
    <linearGradient id="brass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Bell -->
  <ellipse cx="320" cy="150" rx="60" ry="80" fill="url(#brass)" stroke="#B8860B" stroke-width="2"/>

  <!-- Main tube -->
  <rect x="80" y="130" width="240" height="40" fill="url(#brass)" stroke="#B8860B" stroke-width="2" rx="5"/>

  <!-- Slide -->
  <rect x="100" y="100" width="15" height="120" fill="url(#brass)" stroke="#B8860B" stroke-width="2"/>
  <rect x="130" y="100" width="15" height="120" fill="url(#brass)" stroke="#B8860B" stroke-width="2"/>

  <!-- Mouthpiece -->
  <circle cx="80" cy="150" r="15" fill="url(#brass)" stroke="#B8860B" stroke-width="2"/>
  <rect x="60" y="145" width="20" height="10" fill="url(#brass)" stroke="#B8860B" stroke-width="2"/>

  <!-- Labels -->
  <text x="200" y="30" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">Trombone Parts</text>
  <text x="60" y="130" font-family="Arial" font-size="12">Mouthpiece</text>
  <text x="120" y="90" font-family="Arial" font-size="12">Slide</text>
  <text x="180" y="120" font-family="Arial" font-size="12">Main Tube</text>
  <text x="320" y="250" font-family="Arial" font-size="12" text-anchor="middle">Bell</text>

  <!-- Position markers -->
  <text x="100" y="240" font-family="Arial" font-size="10" text-anchor="middle">1st</text>
  <line x1="100" y1="220" x2="100" y2="230" stroke="#333" stroke-width="2"/>
</svg>
