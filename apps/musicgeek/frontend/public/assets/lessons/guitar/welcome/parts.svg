<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Guitar Parts Diagram -->
  <rect x="50" y="50" width="300" height="200" fill="#8B4513" stroke="#000" stroke-width="2"/>
  <circle cx="200" cy="150" r="60" fill="#D2691E" stroke="#000" stroke-width="2"/>

  <!-- Headstock -->
  <rect x="20" y="100" width="30" height="100" fill="#654321" stroke="#000" stroke-width="2"/>

  <!-- Strings -->
  <line x1="50" y1="70" x2="350" y2="70" stroke="#C0C0C0" stroke-width="1"/>
  <line x1="50" y1="100" x2="350" y2="100" stroke="#C0C0C0" stroke-width="1.5"/>
  <line x1="50" y1="130" x2="350" y2="130" stroke="#C0C0C0" stroke-width="2"/>
  <line x1="50" y1="160" x2="350" y2="160" stroke="#C0C0C0" stroke-width="2.5"/>
  <line x1="50" y1="190" x2="350" y2="190" stroke="#C0C0C0" stroke-width="3"/>
  <line x1="50" y1="220" x2="350" y2="220" stroke="#C0C0C0" stroke-width="3.5"/>

  <!-- Labels -->
  <text x="200" y="30" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">Guitar Parts</text>
  <text x="35" y="155" font-family="Arial" font-size="12" text-anchor="middle">Head</text>
  <text x="100" y="140" font-family="Arial" font-size="12">Neck</text>
  <text x="200" y="110" font-family="Arial" font-size="12" text-anchor="middle">Sound Hole</text>
  <text x="280" y="140" font-family="Arial" font-size="12">Body</text>
</svg>
