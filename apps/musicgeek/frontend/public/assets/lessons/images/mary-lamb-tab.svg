<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 300" width="750" height="300">
  <!-- Background -->
  <rect width="750" height="300" fill="#ffffff"/>

  <!-- Title -->
  <text x="375" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#333">
    Mary Had a Little Lamb
  </text>

  <!-- TAB staff -->
  <g id="tab-staff">
    <!-- String labels -->
    <text x="45" y="88" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#666">e</text>
    <text x="45" y="108" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#666">B</text>
    <text x="45" y="128" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#666">G</text>
    <text x="45" y="148" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#666">D</text>
    <text x="45" y="168" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#666">A</text>
    <text x="45" y="188" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#666">E</text>

    <!-- TAB lines -->
    <line x1="65" y1="83" x2="700" y2="83" stroke="#999" stroke-width="1"/>
    <line x1="65" y1="103" x2="700" y2="103" stroke="#999" stroke-width="1"/>
    <line x1="65" y1="123" x2="700" y2="123" stroke="#999" stroke-width="1"/>
    <line x1="65" y1="143" x2="700" y2="143" stroke="#999" stroke-width="1"/>
    <line x1="65" y1="163" x2="700" y2="163" stroke="#999" stroke-width="1"/>
    <line x1="65" y1="183" x2="700" y2="183" stroke="#999" stroke-width="1"/>

    <!-- Start bar -->
    <line x1="65" y1="83" x2="65" y2="183" stroke="#333" stroke-width="2.5"/>

    <!-- Melody on high e string (top line) - Ma-ry had a lit-tle lamb -->
    <text x="100" y="88" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#d32f2f">3</text>
    <text x="140" y="88" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#d32f2f">2</text>
    <text x="180" y="88" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#d32f2f">0</text>
    <text x="220" y="88" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#d32f2f">2</text>
    <text x="260" y="88" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#d32f2f">3</text>
    <text x="300" y="88" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#d32f2f">3</text>
    <text x="340" y="88" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#d32f2f">3</text>

    <!-- Second phrase - lit-tle lamb, lit-tle lamb -->
    <text x="400" y="88" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#1976d2">2</text>
    <text x="440" y="88" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#1976d2">2</text>
    <text x="480" y="88" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#1976d2">2</text>

    <text x="540" y="88" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#388e3c">3</text>
    <text x="580" y="88" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#388e3c">3</text>
    <text x="620" y="88" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#388e3c">3</text>

    <!-- End bar -->
    <line x1="700" y1="83" x2="700" y2="183" stroke="#333" stroke-width="2.5"/>
  </g>

  <!-- Lyrics below -->
  <text x="100" y="210" font-family="Arial, sans-serif" font-size="11" fill="#666">Ma</text>
  <text x="140" y="210" font-family="Arial, sans-serif" font-size="11" fill="#666">ry</text>
  <text x="180" y="210" font-family="Arial, sans-serif" font-size="11" fill="#666">had</text>
  <text x="220" y="210" font-family="Arial, sans-serif" font-size="11" fill="#666">a</text>
  <text x="260" y="210" font-family="Arial, sans-serif" font-size="11" fill="#666">lit</text>
  <text x="300" y="210" font-family="Arial, sans-serif" font-size="11" fill="#666">tle</text>
  <text x="340" y="210" font-family="Arial, sans-serif" font-size="11" fill="#666">lamb</text>

  <text x="400" y="210" font-family="Arial, sans-serif" font-size="11" fill="#666">lit</text>
  <text x="440" y="210" font-family="Arial, sans-serif" font-size="11" fill="#666">tle</text>
  <text x="480" y="210" font-family="Arial, sans-serif" font-size="11" fill="#666">lamb</text>

  <text x="540" y="210" font-family="Arial, sans-serif" font-size="11" fill="#666">lit</text>
  <text x="580" y="210" font-family="Arial, sans-serif" font-size="11" fill="#666">tle</text>
  <text x="620" y="210" font-family="Arial, sans-serif" font-size="11" fill="#666">lamb</text>

  <!-- Instructions -->
  <rect x="50" y="235" width="650" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="6"/>
  <text x="375" y="258" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1565c0" text-anchor="middle">
    Play on the high e string (thinnest string)
  </text>
  <text x="375" y="275" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">
    Numbers = frets to press • 0 = open string (no fingers) • Play left to right
  </text>
</svg>
