<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <!-- Background -->
  <rect width="800" height="350" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#333">
    Chromatic Exercise (1-2-3-4 Pattern)
  </text>

  <!-- Subtitle -->
  <text x="400" y="58" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#666">
    Play across all strings, one finger per fret
  </text>

  <!-- TAB staff -->
  <g id="tab-staff">
    <!-- String labels on left -->
    <text x="45" y="98" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#666">e</text>
    <text x="45" y="118" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#666">B</text>
    <text x="45" y="138" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#666">G</text>
    <text x="45" y="158" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#666">D</text>
    <text x="45" y="178" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#666">A</text>
    <text x="45" y="198" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#d32f2f">E</text>

    <!-- TAB lines -->
    <line x1="65" y1="93" x2="750" y2="93" stroke="#999" stroke-width="1"/>
    <line x1="65" y1="113" x2="750" y2="113" stroke="#999" stroke-width="1"/>
    <line x1="65" y1="133" x2="750" y2="133" stroke="#999" stroke-width="1"/>
    <line x1="65" y1="153" x2="750" y2="153" stroke="#999" stroke-width="1"/>
    <line x1="65" y1="173" x2="750" y2="173" stroke="#999" stroke-width="1"/>
    <line x1="65" y1="193" x2="750" y2="193" stroke="#999" stroke-width="1"/>

    <!-- Start bar -->
    <line x1="65" y1="93" x2="65" y2="193" stroke="#333" stroke-width="2.5"/>

    <!-- Fret numbers on low E string (bottom line) -->
    <text x="100" y="198" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#d32f2f">1</text>
    <text x="135" y="198" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#d32f2f">2</text>
    <text x="170" y="198" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#d32f2f">3</text>
    <text x="205" y="198" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#d32f2f">4</text>

    <!-- Fret numbers on A string -->
    <text x="250" y="178" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#1976d2">1</text>
    <text x="285" y="178" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#1976d2">2</text>
    <text x="320" y="178" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#1976d2">3</text>
    <text x="355" y="178" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#1976d2">4</text>

    <!-- Fret numbers on D string -->
    <text x="400" y="158" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#388e3c">1</text>
    <text x="435" y="158" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#388e3c">2</text>
    <text x="470" y="158" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#388e3c">3</text>
    <text x="505" y="158" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#388e3c">4</text>

    <!-- Fret numbers on G string -->
    <text x="550" y="138" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#f57c00">1</text>
    <text x="585" y="138" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#f57c00">2</text>
    <text x="620" y="138" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#f57c00">3</text>
    <text x="655" y="138" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#f57c00">4</text>

    <!-- Placeholder dashes for B and high e strings (continue pattern) -->
    <text x="700" y="118" font-family="Courier New, monospace" font-size="16" fill="#999">...</text>
    <text x="700" y="98" font-family="Courier New, monospace" font-size="16" fill="#999">...</text>

    <!-- End bar -->
    <line x1="750" y1="93" x2="750" y2="193" stroke="#333" stroke-width="2.5"/>
  </g>

  <!-- Finger indicators below TAB -->
  <text x="100" y="220" font-family="Arial, sans-serif" font-size="11" fill="#999">1</text>
  <text x="135" y="220" font-family="Arial, sans-serif" font-size="11" fill="#999">2</text>
  <text x="170" y="220" font-family="Arial, sans-serif" font-size="11" fill="#999">3</text>
  <text x="205" y="220" font-family="Arial, sans-serif" font-size="11" fill="#999">4</text>
  <text x="250" y="220" font-family="Arial, sans-serif" font-size="11" fill="#999">1</text>
  <text x="285" y="220" font-family="Arial, sans-serif" font-size="11" fill="#999">2</text>
  <text x="320" y="220" font-family="Arial, sans-serif" font-size="11" fill="#999">3</text>
  <text x="355" y="220" font-family="Arial, sans-serif" font-size="11" fill="#999">4</text>

  <text x="400" y="235" font-family="Arial, sans-serif" font-size="10" fill="#999" text-anchor="middle">
    ↑ Finger numbers (index=1, middle=2, ring=3, pinky=4)
  </text>

  <!-- Instructions -->
  <rect x="50" y="255" width="700" height="75" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="6"/>
  <text x="400" y="278" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565c0" text-anchor="middle">
    How to Play:
  </text>
  <text x="400" y="298" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">
    1. Start on low E string (red) • Play frets 1-2-3-4 with fingers 1-2-3-4
  </text>
  <text x="400" y="315" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">
    2. Move to A string (blue), repeat 1-2-3-4 • Continue on D, G, B, and high e strings
  </text>
</svg>
