services:
  startgeek:
    image: node:20-alpine
    container_name: StartGeek
    restart: unless-stopped
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - .:/app
      - startgeek_modules:/app/node_modules
    command: sh -c "npm install && npm run build && NODE_ENV=production npm run serve"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(() => process.exit(0)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  startgeek_modules: