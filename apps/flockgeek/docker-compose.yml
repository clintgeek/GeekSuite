  backend:
    image: geeksuite/flockgeek:latest
    container_name: flockgeek
    command: node src/server.js
    ports:
      - "5001:4094"
    environment:
      NODE_ENV: development # Keep existing setting
      PORT: 4094
      JWT_SECRET: change-me
      CORS_ORIGIN: http://localhost:4081,http://localhost:5194,http://localhost:5183,http://localhost:5173,https://flockgeek.clintgeek.com
      MONGODB_URI: mongodb://localhost:27017/flockgeek?authSource=admin
    volumes:
      - /mnt/Media/Projects/GeekSuite/apps/flockgeek/backend:/app/apps/flockgeek/backend
      - /app/apps/flockgeek/backend/node_modules
    working_dir: /app/apps/flockgeek/backend
