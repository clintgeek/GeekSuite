<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>FitnessGeek - Nutrition & Fitness Tracking</title>
    <meta name="description" content="Track your nutrition, fitness goals, and weight with FitnessGeek - powered by the GeekSuite ecosystem" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0D9488" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FitnessGeek" />
    <meta name="msapplication-TileColor" content="#0D9488" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.svg" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-192x192.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.svg" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-192x192.svg" />

    <!-- Sync theme before React boots. Reads the shared `geek_theme` cookie
         set by any GeekSuite app on .clintgeek.com. Mirrors the logic in
         `themePrebootScript` exported from @geeksuite/user. -->
    <script>
      (function () {
        try {
          var m = document.cookie.match(/(?:^|; )geek_theme=([^;]*)/);
          var p = m ? decodeURIComponent(m[1]) : 'auto';
          if (p === 'system') p = 'auto';
          if (p !== 'light' && p !== 'dark' && p !== 'auto') p = 'auto';
          var t = p === 'auto'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : p;
          document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

  </body>
</html>
