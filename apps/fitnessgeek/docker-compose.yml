services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitnessgeek-backend
    environment:
      - TZ=America/Chicago
      - NODE_ENV=production
      - PORT=5002
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - BASEGEEK_URL=${BASEGEEK_URL}
      - REDIS_URL=${REDIS_URL}
      - AI_GEEK_API_KEY=${AI_GEEK_API_KEY}
      - USDA_API_KEY=${USDA_API_KEY}
      - NUTRITIONIX_APP_ID=${NUTRITIONIX_APP_ID}
      - NUTRITIONIX_API_KEY=${NUTRITIONIX_API_KEY}
      - OPENFOODFACTS_API_URL=${OPENFOODFACTS_API_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - "4080:5002"
    volumes:
      - ./frontend/dist:/app/public
    networks:
      - fitnessgeek_network
    restart: always

networks:
  fitnessgeek_network:
    driver: bridge