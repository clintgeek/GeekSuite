services:
  storygeek:
    image: geeksuite/storygeek:latest
    container_name: storygeek
    restart: unless-stopped
    environment:
      TZ: America/Chicago
      NODE_ENV: production
      PORT: 9977
      DB_URI: ${DB_URI}
      JWT_SECRET: ${JWT_SECRET}
      BASEGEEK_URL: ${BASEGEEK_URL:-https://basegeek.clintgeek.com}
      BASEGEEK_JWT_TOKEN: ${BASEGEEK_JWT_TOKEN}
      STORYGEEK_FREE_ONLY: ${STORYGEEK_FREE_ONLY:-true}
    ports:
      - "9977:9977"
    networks:
      - datageek_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:9977/api/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

networks:
  datageek_network:
    external: true
