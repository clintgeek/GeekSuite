services:
  notegeek:
    image: geeksuite/notegeek:latest
    container_name: notegeek
    restart: unless-stopped

    # All runtime env (DB_URI, JWT_SECRET, JWT_REFRESH_SECRET, PORT, etc.)
    # is loaded from .env.production by env_file.
    # Don't list those vars here as ${VAR} substitutions — that pulls from
    # docker compose's .env file (different lookup path) and breaks when
    # only .env.production exists.
    env_file:
      - .env.production

    # Compose-fixed values that don't vary per environment.
    environment:
      TZ: America/Chicago
      NODE_ENV: production
      APP_NAME: notegeek

    ports:
      - "9988:9988"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9988/"]
      interval: 30s
      timeout: 10s
      retries: 3
